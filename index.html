<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilgi Üssü | Profesyonel Yönetim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-white flex h-screen overflow-hidden text-slate-800">

    <aside class="hidden md:flex w-72 bg-slate-50 border-r border-slate-200 flex-col flex-shrink-0">
        <div class="p-4 border-b border-slate-200 bg-white/50">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3">Bilgi Akışı</h2>
            <div class="flex gap-1 bg-slate-100 p-1 rounded-xl">
                <button class="flex-1 text-[10px] font-bold py-1.5 rounded-lg bg-white shadow-sm">HEPSİ</button>
                <button class="flex-1 text-[10px] font-bold py-1.5 rounded-lg text-slate-500">ACİL</button>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto custom-scrollbar" id="noteSidebar">
            </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        
        <header class="h-16 border-b border-slate-100 flex items-center justify-between px-6 bg-white z-20">
            <div class="flex-1 max-w-2xl relative">
                <span class="absolute inset-y-0 left-4 flex items-center text-slate-300">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" oninput="window.globalSearch(this.value)" placeholder="Arama yapın... (Ctrl+K)" class="w-full bg-slate-50 focus:bg-white border border-slate-100 focus:border-blue-500 rounded-2xl py-2.5 pl-11 text-sm outline-none transition-all">
            </div>

            <div class="flex items-center gap-4 ml-6">
                <button onclick="openNoteCreate()" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-xs font-black uppercase tracking-tighter hover:bg-blue-700 transition-all shadow-lg shadow-blue-100">Yeni Ekle</button>
                <button id="btnLogout" class="p-2 text-slate-300 hover:text-red-500 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </div>
        </header>

        <main class="flex-1 flex flex-col overflow-hidden relative">
            
            <div id="tagCloudSection" class="bg-slate-50 transition-all duration-500 ease-in-out flex items-center justify-center overflow-hidden shrink-0 border-b border-slate-100">
                <div id="tagCloud" class="flex flex-wrap justify-center content-center transition-all duration-300"></div>
            </div>

            <div id="mainContent" class="flex-1 flex flex-col overflow-y-auto bg-white">
                <div class="max-w-5xl mx-auto w-full flex flex-col">
                    
                    <div id="stickyHeader" class="hidden sticky top-0 bg-white/90 backdrop-blur-md z-10 px-6 py-4 border-b border-slate-50 flex items-center justify-between">
                        <div id="activeFiltersHeader" class="flex flex-wrap gap-2"></div>
                        <span id="noteCount" class="text-[10px] font-black text-slate-300 uppercase"></span>
                    </div>

                    <div id="searchResultsArea" class="hidden p-6 animate-in fade-in duration-500"></div>
                    <div id="noteList" class="hidden divide-y divide-slate-50 animate-in fade-in"></div>
                    <div id="noteDetailArea" class="hidden animate-in slide-in-from-bottom-4 duration-500"></div>

                </div>
            </div>
        </main>
    </div>

    <div id="noteCreateArea" class="fixed inset-0 bg-white z-[100] hidden flex-col overflow-y-auto translate-y-full transition-transform duration-500 ease-in-out">
        </div>

    <script type="module" src="auth-check.js"></script>
    <script type="module" src="logout.js"></script>
    <script type="module" src="load-notes.js"></script>
</body>
</html>
